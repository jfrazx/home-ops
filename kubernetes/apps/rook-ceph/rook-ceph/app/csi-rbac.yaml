---
# CSI plugin ServiceAccounts + RBAC for the ceph-csi-operator.
#
# Rook v1.20.x bundles the ceph-csi-operator subchart with csiServiceAccountPrefix=""
# so the rbd/cephfs ctrlplugin & nodeplugin DaemonSets/Deployments reference the
# UN-prefixed ServiceAccount names below (rbd-nodeplugin-sa, etc.). The operator does
# NOT create these SAs/RBAC itself, and the Rook chart does not render them — they were
# previously provided by a manually-installed `ceph-csi-drivers` Helm release that no
# longer exists. Without them, CSI pods fail to fetch their projected SA token, and the
# csi-attacher/csi-provisioner are denied leader-election leases -> volumes never attach.
#
# Rendered verbatim from ceph-csi-operator v1.0.1, chart deploy/charts/ceph-csi-drivers
# with drivers.rbd.name=rbd / drivers.cephfs.name=cephfs (nfs/nvmeof disabled), Driver
# and OperatorConfig CRs excluded (those already exist in-cluster). namespace: rook-ceph
# is set explicitly on the namespaced Role/RoleBinding/ServiceAccount objects.
# Source: ceph-csi-drivers/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cephfs-ctrlplugin-sa
  namespace: rook-ceph
---
# Source: ceph-csi-drivers/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cephfs-nodeplugin-sa
  namespace: rook-ceph
---
# Source: ceph-csi-drivers/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-ctrlplugin-sa
  namespace: rook-ceph
---
# Source: ceph-csi-drivers/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-nodeplugin-sa
  namespace: rook-ceph
---
