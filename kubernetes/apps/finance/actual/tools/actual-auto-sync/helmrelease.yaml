---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app actual-auto-sync
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h

  values:
    controllers:
      actual-auto-sync:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/seriouslag/actual-auto-sync
              tag: latest@sha256:5f71f575f58b6fc0194b322ba4cd661a2e46dfaf4dc8029526d20fe2ba882d82

            env:
              TZ: ${TIMEZONE}
              ACTUAL_SERVER_URL: "http://actual.finance.svc.cluster.local:5006"
              CRON_SCHEDULE: "0 7 * * *"
              LOG_LEVEL: "info"

            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi

    persistence:
      tmp:
        type: emptyDir
